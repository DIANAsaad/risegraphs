<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Formula Circle - Drag & Drop</title>

    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"
    ></script>

    <style>
      :root {
        --ink: black;
        --muted: #6b7280;
        --bg: #ffffff;
        --ok: #16a34a;
        --bad: #dc2626;
        --line: #fff5ec;
        --panel: #ffece6;
        --accent: #ff4500;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: var(--bg);
      }

      .wrap {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
        padding: 16px;
        max-width: 980px;
        margin: auto;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
      }

      h2 {
        text-align: center;
        color: var(--accent);
      }

      .stage {
        display: flex;
        justify-content: center;
      }

      .circleWrap {
        width: min(420px, 92vw);
        aspect-ratio: 1/1;
        position: relative;
      }

      .circle {
        position: absolute;
        inset: 0;
        border: 8px solid var(--accent);
        border-radius: 50%;
        background: #fff;
        transition: 0.3s;
      }

      .circle.ok {
        border-color: var(--ok);
        box-shadow: 0 0 0 10px rgba(22, 163, 74, 0.25);
      }

      .circle.bad {
        border-color: var(--bad);
        box-shadow: 0 0 0 10px rgba(220, 38, 38, 0.25);
      }

      .circle::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 6px;
        background: var(--accent);
        transform: translateY(-50%);
      }

      .circle::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 50%;
        background: var(--accent);
        transform: translateX(-50%);
      }

      .circle.ok::before,
      .circle.ok::after {
        background: var(--ok);
      }

      .circle.bad::before,
      .circle.bad::after {
        background: var(--bad);
      }

      .drop {
        position: absolute;
        width: 120px;
        height: 64px;
        border: 2px dashed var(--line);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        font-weight: 700;
        color: var(--muted);
      }

      .drop.top {
        top: 14%;
        left: 50%;
        transform: translateX(-50%);
      }

      .drop.left {
        left: 12%;
        top: 68%;
        transform: translateY(-50%);
      }

      .drop.right {
        right: 12%;
        top: 68%;
        transform: translateY(-50%);
      }

      .pool {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 12px;
      }

      .token {
        cursor: grab;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 600;
      }

      .controls {
        display: flex;
        gap: 10px;
      }

      select,
      button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        font-weight: 600;
      }

      button {
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        color: black;
        border: 1px solid var(--line);
      }

      .feedback {
        margin-top: 12px;
        padding: 10px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid var(--line);
        min-height: 40px;
      }

      .feedback.ok {
        border-color: var(--ok);
      }
      .feedback.bad {
        border-color: var(--bad);
      }

      .formula {
        margin-top: 10px;
        font-weight: 700;
        color: var(--accent);
      }

      .scroll-guide {
        display: none;
      }

      /* New styles for small screens */
      @media (max-width: 1000px) {
        .wrap {
          grid-template-columns: 1fr; /* Stacking the columns for small screens */
        }

        /* Put the Formula Controls card FIRST and the Circle card SECOND */
        .wrap > .card:nth-of-type(2) {
          order: -1;
        }

        .circleWrap {
          width: 80vw; /* Make the circle slightly smaller */
          margin-top: 20px;
        }

        /* Instruction for users to scroll down */
        .scroll-guide {
          display: block;
          text-align: center;
          font-size: 16px;
          color: var(--muted);
          margin-top: 20px;
        }

        /* Hide the scroll guide on desktop screens */
      }

      /* By default, speak button will not be visible */
      .speak {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <h2>Formula Circle</h2>

        <div class="stage">
          <div class="circleWrap">
            <div id="circle" class="circle"></div>

            <div class="drop top">Drop</div>
            <div class="drop left">Drop</div>
            <div class="drop right">Drop</div>
          </div>
        </div>

        <div class="pool">
          <div class="token" draggable="true" data-v="Q">Flow</div>
          <div class="token" draggable="true" data-v="Dt">Area</div>
          <div class="token" draggable="true" data-v="Volume">Velocity</div>
        </div>
      </div>

      <div class="card">
        <h2>Formula Controls</h2>

        <div class="controls">
          <select id="solve">
            <option value="Q">Solve for Flow</option>
            <option value="Dt">Solve for Detention Time</option>
            <option value="WLR">Solve for WLR</option>
            <option value="SOR">Solve for SOR</option>
          </select>

          <button id="check">Check</button>
          <button id="reset" class="secondary">Reset</button>
        </div>

        <div id="fb" class="feedback">Drag values then check.</div>

        <div id="formula" class="formula">$$Flow= Area\times Velocity$$</div>
        <div class="scroll-guide">
          <p>Scroll down to the circle to apply the correct formula.</p>
        </div>
      </div>
    </div>

    <script>
      const correct = {
        Q: { top: "Flow" },
        Dt: { top: "Volume" },
        WLR: { top: "Flow" },
        SOR: { top: "Flow" },
      };

      const placed = { top: null, left: null, right: null };

      const circle = document.getElementById("circle");
      const fb = document.getElementById("fb");
      const formula = document.getElementById("formula");

      document.querySelectorAll(".token").forEach((t) => {
        t.ondragstart = (e) => {
          e.dataTransfer.setData("v", t.dataset.v);
        };
      });

      document.querySelectorAll(".drop").forEach((d) => {
        d.ondragover = (e) => e.preventDefault();
        d.ondrop = (e) => {
          e.preventDefault();
          circle.className = "circle";
          fb.className = "feedback";

          let v = e.dataTransfer.getData("v");
          let slot = d.classList.contains("top")
            ? "top"
            : d.classList.contains("left")
              ? "left"
              : "right";

          for (let k in placed) if (placed[k] == v) placed[k] = null;
          placed[slot] = v;

          d.textContent = v;

          document.querySelectorAll(".token").forEach((t) => {
            t.style.display = Object.values(placed).includes(t.dataset.v)
              ? "none"
              : "";
          });
        };
      });

      document.getElementById("check").onclick = () => {
        circle.className = "circle";
        fb.className = "feedback";
        let formula = document.getElementById("formula");
        if (!placed.top || !placed.left || !placed.right) {
          fb.textContent = "Fill all three slots.";
          return;
        }

        let selectedOption = document.getElementById("solve").value;
        let ok = placed.top === correct[selectedOption].top;

        let formulaRewrites = "";
        if (selectedOption === "Q") {
          formulaRewrites = `1. $$Flow = Velocity \\times Area$$
        <br>2. $$Velocity = \\frac{Flow}{Area}$$
        <br>3. $$Area = \\frac{Flow}{Velocity}$$`;
        } else if (selectedOption === "Dt") {
          formulaRewrites = `1. $$Dt = \\frac{Volume}{Flow}$$
        <br>2. $$Flow = \\frac{Volume}{Dt}$$
        <br>3. $$Volume = Flow \\times Dt$$`;
        } else if (selectedOption === "WLR") {
          formulaRewrites = `1. $$WLR = \\frac{Flow}{Length}$$
        <br>2. $$Flow = \\frac{WLR}{Length}$$
        <br>3. $$Length = \\frac{Flow}{WLR}$$`;
        } else if (selectedOption === "SOR") {
          formulaRewrites = `1. $$SOR = \\frac{Flow}{Surface Area}$$
        <br>2. $$Flow = SOR \\times Surface Area$$
        <br>3. $$Surface Area = \\frac{Flow}{SOR}$$`;
        }

        if (ok) {
          circle.classList.add("ok");
          fb.classList.add("ok");
          fb.innerHTML = `Correct! The rearranged formulas for ${selectedOption} are:<br><b>Rewritten formulas:</b><br>${formulaRewrites}`;
          renderFormula();
        } else {
          circle.classList.add("bad");
          fb.classList.add("bad");

          fb.innerHTML = `Wrong. Correct layout for ${selectedOption}: Top = ${correct[selectedOption].top} 
      <br>${formulaRewrites}`;
          renderFormula();
        }
        formula.textContent = "";
      };

      document.getElementById("reset").onclick = () => {
        circle.className = "circle";
        fb.className = "feedback";
        fb.textContent = "Drag values then check.";
        formula.textContent = "";

        for (let k in placed) placed[k] = null;
        document
          .querySelectorAll(".drop")
          .forEach((d) => (d.textContent = "Drop"));
        document
          .querySelectorAll(".token")
          .forEach((t) => (t.style.display = ""));
      };

      function renderFormula() {
        let selectedOption = document.getElementById("solve").value;

        let latexFormula = "";
        let tokens = [];

        if (selectedOption === "Q") {
          latexFormula = "$$Flow=Velocity\\times Area$$";
          tokens = ["Velocity", "Area", "Flow"];
        } else if (selectedOption === "Dt") {
          latexFormula = "$$Dt = \\frac{Volume}{Flow}$$";
          tokens = ["Dt", "Flow", "Volume"];
        } else if (selectedOption === "WLR") {
          latexFormula = "$$WLR = \\frac{Flow}{Length}$$";
          tokens = ["WLR", "Flow", "Length"];
        } else if (selectedOption === "SOR") {
          latexFormula = "$$SOR = \\frac{Flow}{Surface Area}$$";
          tokens = ["SOR", "Flow", "Surface Area"];
        }

        formula.textContent = latexFormula;
        MathJax.Hub.Queue(["Typeset", MathJax.Hub]);

        let pool = document.querySelector(".pool");
        pool.innerHTML = "";

        tokens.forEach((token) => {
          let newToken = document.createElement("div");
          newToken.className = "token";
          newToken.dataset.v = token;
          newToken.textContent = token;
          newToken.setAttribute("draggable", "true");
          newToken.ondragstart = (e) => {
            e.dataTransfer.setData("v", token);
          };
          pool.appendChild(newToken);
        });
      }

      document.getElementById("solve").addEventListener("change", () => {
        fb.textContent = ""; // Reset feedback when solve option changes
        renderFormula();
        circle.className = "circle";

        for (let k in placed) placed[k] = null;
        document
          .querySelectorAll(".drop")
          .forEach((d) => (d.textContent = "Drop"));
        document
          .querySelectorAll(".token")
          .forEach((t) => (t.style.display = ""));
      });
    </script>
  </body>
</html>
