<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear Equation Forms Drag and Drop</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["\\(", "\\)"],
            ["$", "$"],
          ],
        },
        svg: {
          fontCache: "global",
        },
      };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>

    <style>
      body {
        background: white;
        font-family: Arial, sans-serif;
        padding: 30px 0;
        margin: 0;
      }

      .activity-wrap {
        max-width: 1100px;
        margin: 0 auto;
        width: 100%;
      }
      .derscription-zone {
        font-size: 0.5rem;
      }
      /* Ensure equal-width columns */
      .drop-zone {
        min-height: 220px;
        border: 2px dashed #ff4500;
        border-radius: 18px;
        background: #fff;
        padding: 20px;
        transition: 0.25s ease;
        position: relative;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        word-wrap: break-word;
        flex: 1;
        margin: 0 10px;
      }

      .drop-zone h4,
      .drop-zone p {
        word-wrap: break-word;
        white-space: normal;
        overflow: visible;
      }

      .zone-description {
        font-size: 0.7rem;
        color: #555;
        margin-bottom: 12px;
      }

      .drop-zone.drag-over {
        border-color: #0d6efd;
        background: #eef5ff;
      }

      .drop-zone.correct-flash {
        background: #d1f7dc;
        border-color: #1f9d55;
      }

      .drop-zone.wrong-flash {
        background: #ffd6d6;
        border-color: #d62828;
      }

      .drop-list {
        min-height: 80px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: flex-start;
      }

      .stack-area {
        background: #fff;
        border-radius: 18px;
        border: 2px solid #ff4500;
        padding: 24px;
        min-height: 320px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        position: relative;
        text-align: center;
      }

      .stack-title {
        font-weight: 700;
        margin-bottom: 6px;
        word-wrap: break-word;
        white-space: normal;
        overflow: visible;
      }

      .stack-subtitle {
        color: #555;
        margin-bottom: 22px;
        font-size: 0.95rem;
      }

      .card-stack {
        position: relative;
        width: 280px;
        height: 180px;
        margin: 0 auto;
      }

      .stack-shadow {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 16px;
        background: #ececec;
        top: 12px;
        left: 12px;
        z-index: 1;
      }

      .stack-shadow.second {
        top: 6px;
        left: 6px;
        background: #f1f1f1;
        z-index: 2;
      }

      .draggable-card {
        position: absolute;
        inset: 0;
        border-radius: 16px;
        background: #ffffff;
        border: 2px solid #d9d9d9;
        padding: 20px;
        cursor: grab;
        user-select: none;
        z-index: 3;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        transition:
          transform 0.2s ease,
          opacity 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .draggable-card:active {
        cursor: grabbing;
      }

      .draggable-card.dragging {
        opacity: 0.85;
        transform: scale(1.03);
      }

      .draggable-card.correct-card {
        background: #d1f7dc;
        border-color: #1f9d55;
      }

      .draggable-card.wrong-card {
        background: #ffd6d6;
        border-color: #d62828;
      }

      .expression-label {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .expression-text {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .placed-card {
        background: #f8f9fa;
        border: 1px solid #d7d7d7;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 600;
      }

      .status-box {
        text-align: center;
        margin-top: 24px;
        font-weight: 600;
        min-height: 48px;
      }

      .counter {
        margin-top: 8px;
        color: #555;
        font-size: 0.95rem;
      }

      .controls {
        margin-top: 20px;
        text-align: center;
      }

      .row {
        margin-top: 20px;
        display: flex;
        justify-content: center;
      }

      .col-lg-12 {
        display: flex;
        justify-content: center;
        width: 80%;
      }

      /* Updated layout to remove horizontal scrolling */
      .row.g-4 {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .col-lg-6 {
        flex: 1;
        min-width: 32%; /* Make sure all columns fit without scrolling */
      }

      @media (max-width: 700px) {
        .row.g-4 {
          display: flex;
          justify-content: space-between;
        }

        .col-lg-6 {
          flex: 1;
          min-width: 32%; /* Ensure columns stay side by side */
        }

        .stack-area {
          margin-top: 20px;
          width: 100%;
        }

        .card-stack {
          width: 100%;
          max-width: 280px;
          margin: 0 auto;
        }

        .zone-description {
          font-size: 0.5rem;
          color: #555;
          margin-bottom: 12px;
        }
        .status-box {
          font-size: 0.7rem;
          text-align: center;
          margin-top: 24px;
          font-weight: 600;
          min-height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container activity-wrap">
      <div class="row g-4 align-items-stretch">
        <!-- Categories Row -->
        <div class="col-lg-6">
          <div class="drop-zone" id="pointSlope" data-category="point-slope">
            <h4><b>Point Slope Form</b></h4>
            <p class="zone-description">\( y - y_1 = m(x - x_1) \)</p>
            <div class="drop-list" id="pointSlopeList"></div>
          </div>
        </div>

        <div class="col-lg-6">
          <div
            class="drop-zone"
            id="slopeIntercept"
            data-category="slope-intercept"
          >
            <h4><b>Slope Intercept Form</b></h4>
            <p class="zone-description">\( y = mx + b \)</p>
            <div class="drop-list" id="slopeInterceptList"></div>
          </div>
        </div>

        <div class="col-lg-6">
          <div
            class="drop-zone"
            id="standardForm"
            data-category="standard-form"
          >
            <h4><b>Standard Form</b></h4>
            <p class="zone-description">\( Ax + By = C \)</p>
            <div class="drop-list" id="standardFormList"></div>
          </div>
        </div>
      </div>

      <!-- Card Stack Row -->
      <div class="row">
        <div class="col-lg-12">
          <div class="stack-area">
            <h4 class="stack-title">Card Stack</h4>
            <p class="status-box" id="statusBox">Ready to sort</p>

            <div class="card-stack" id="cardStack">
              <div class="stack-shadow"></div>
              <div class="stack-shadow second"></div>
            </div>

            <div class="counter" id="counterBox">0 sorted</div>

            <div class="controls">
              <button class="btn btn-outline-secondary btn-sm" id="resetBtn">
                Reset Activity
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const originalCards = [
        {
          id: 1,
          text: "\\( y - 2 = 3(x - 1) \\)",
          category: "point-slope",
          note: "\\( y - y_1 = m(x - x_1) \\Rightarrow m = 3,\\ (x_1, y_1) = (1, 2) \\)",
        },
        {
          id: 2,
          text: "\\( y - 4 = -2(x - 5) \\)",
          category: "point-slope",
          note: "\\( y - y_1 = m(x - x_1) \\Rightarrow m = -2,\\ (x_1, y_1) = (5, 4) \\)",
        },
        {
          id: 3,
          text: "\\( y + 3 = 2(x - 2) \\)",
          category: "point-slope",
          note: "\\( y - (-3) = 2(x - 2) \\Rightarrow m = 2,\\ (x_1, y_1) = (2, -3) \\)",
        },
        {
          id: 4,
          text: "\\( y = 3x + 2 \\)",
          category: "slope-intercept",
          note: "\\( y = mx + b \\Rightarrow m = 3,\\ b = 2 \\)",
        },
        {
          id: 5,
          text: "\\( y = -2x - 1 \\)",
          category: "slope-intercept",
          note: "\\( y = mx + b \\Rightarrow m = -2,\\ b = -1 \\)",
        },
        {
          id: 6,
          text: "\\( y = \\frac{1}{2}x + 4 \\)",
          category: "slope-intercept",
          note: "\\( y = mx + b \\Rightarrow m = \\frac{1}{2},\\ b = 4 \\)",
        },
        {
          id: 7,
          text: "\\( 2x + 3y = 6 \\)",
          category: "standard-form",
          note: "\\( Ax + By = C \\Rightarrow A = 2,\\ B = 3,\\ C = 6 \\)",
        },
        {
          id: 8,
          text: "\\( x - 4y = 8 \\)",
          category: "standard-form",
          note: "\\( Ax + By = C \\Rightarrow A = 1,\\ B = -4,\\ C = 8 \\)",
        },
        {
          id: 9,
          text: "\\( 5x + 2y = 10 \\)",
          category: "standard-form",
          note: "\\( Ax + By = C \\Rightarrow A = 5,\\ B = 2,\\ C = 10 \\)",
        },
      ];

      let cards = [];
      let currentCard = null;
      let sortedCount = 0;

      const cardStack = document.getElementById("cardStack");
      const pointSlopeList = document.getElementById("pointSlopeList");
      const slopeInterceptList = document.getElementById("slopeInterceptList");
      const standardFormList = document.getElementById("standardFormList");
      const statusBox = document.getElementById("statusBox");
      const counterBox = document.getElementById("counterBox");
      const resetBtn = document.getElementById("resetBtn");

      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      async function typesetElements(elements) {
        if (!window.MathJax || !MathJax.typesetPromise) return;
        try {
          await MathJax.typesetPromise(elements);
        } catch (err) {
          console.error("MathJax typeset error:", err);
        }
      }

      async function setStatus(message) {
        statusBox.innerHTML = message;
        await typesetElements([statusBox]);
      }

      function updateCounter() {
        counterBox.textContent = `${sortedCount} sorted`;
      }

      function clearPlacedCards() {
        pointSlopeList.innerHTML = "";
        slopeInterceptList.innerHTML = "";
        standardFormList.innerHTML = "";
      }

      function clearTopCard() {
        const existing = cardStack.querySelector(".draggable-card");
        if (existing) existing.remove();
      }

      async function renderNextCard() {
        clearTopCard();

        if (cards.length === 0) {
          currentCard = null;
          await setStatus("All cards completed");
          return;
        }

        currentCard = cards[0];

        const card = document.createElement("div");
        card.className = "draggable-card";
        card.draggable = true;
        card.dataset.id = currentCard.id;
        card.dataset.category = currentCard.category;

        card.innerHTML = `
          <div class="expression-label">Expression</div>
          <div class="expression-text">${currentCard.text}</div>
        `;

        card.addEventListener("dragstart", handleDragStart);
        card.addEventListener("dragend", handleDragEnd);

        cardStack.appendChild(card);
        await typesetElements([card]);
      }

      function handleDragStart(e) {
        e.dataTransfer.setData("text/plain", e.target.dataset.id);
        e.target.classList.add("dragging");
      }

      function handleDragEnd(e) {
        e.target.classList.remove("dragging");
        document
          .querySelectorAll(".drop-zone")
          .forEach((zone) => zone.classList.remove("drag-over"));
      }

      function flashZone(zone, className) {
        zone.classList.add(className);
        setTimeout(() => {
          zone.classList.remove(className);
        }, 500);
      }

      async function placeCardInZone(cardData, zoneList) {
        const placed = document.createElement("div");
        placed.className = "placed-card";
        placed.innerHTML = cardData.text;
        zoneList.appendChild(placed);
        await typesetElements([placed]);
      }

      async function handleDrop(zoneCategory, zoneElement, zoneList) {
        if (!currentCard) return;

        const activeCard = cardStack.querySelector(".draggable-card");
        if (!activeCard) return;

        const isCorrect = currentCard.category === zoneCategory;

        if (isCorrect) {
          activeCard.classList.add("correct-card");
          flashZone(zoneElement, "correct-flash");
          await setStatus(
            `Correct: ${currentCard.text} is <strong>${zoneCategory}</strong>. ${currentCard.note}`,
          );

          setTimeout(async () => {
            await placeCardInZone(currentCard, zoneList);
            cards.shift();
            sortedCount++;
            updateCounter();
            await renderNextCard();
          }, 450);
        } else {
          activeCard.classList.add("wrong-card");
          flashZone(zoneElement, "wrong-flash");
          await setStatus(
            `Incorrect: ${currentCard.text} does not belong in <strong>${zoneCategory}</strong>. ${currentCard.note}`,
          );

          setTimeout(async () => {
            cards.shift();
            sortedCount++;
            updateCounter();
            await renderNextCard();
          }, 450);
        }
      }

      function addZoneEvents(zone, zoneCategory, zoneList) {
        zone.addEventListener("dragover", (e) => {
          e.preventDefault();
          zone.classList.add("drag-over");
        });

        zone.addEventListener("dragleave", () => {
          zone.classList.remove("drag-over");
        });

        zone.addEventListener("drop", async (e) => {
          e.preventDefault();
          zone.classList.remove("drag-over");
          await handleDrop(zoneCategory, zone, zoneList);
        });
      }

      async function resetActivity() {
        cards = shuffle(originalCards);
        currentCard = null;
        sortedCount = 0;
        clearPlacedCards();
        clearTopCard();
        updateCounter();
        await setStatus("Ready to sort");
        await renderNextCard();
      }

      addZoneEvents(
        document.getElementById("pointSlope"),
        "point-slope",
        pointSlopeList,
      );
      addZoneEvents(
        document.getElementById("slopeIntercept"),
        "slope-intercept",
        slopeInterceptList,
      );
      addZoneEvents(
        document.getElementById("standardForm"),
        "standard-form",
        standardFormList,
      );

      resetBtn.addEventListener("click", resetActivity);

      window.addEventListener("load", async () => {
        await resetActivity();
      });
    </script>
  </body>
</html>
