<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>D3 Graph – Click to Add Points</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #ffffff;
    display:grid;
    align-items: center;
  }

  #controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  button {
    padding: 8px 12px;
    border: 1px solid #ff4500;
    background: #ffece6;
    border-radius: 10px;
    cursor: pointer;
    color: #ff4500;
  }

  #chart {
    width: 100%;
    max-width: 1000px;
    margin: auto;
  }
</style>
</head>

<body>

<div id="controls">
  <button id="joinBtn">Join Points</button>
  <button id="pointsBtn">Points Only</button>
  <button id="undoBtn">Undo</button>
  <button id="clearBtn">Clear</button>
</div>

<div id="chart"></div>

<script>
const width = 1000;
const height = 500;
const margin = 40;

let pts = [];
let joined = false;

// SVG
const svg = d3.select("#chart")
  .append("svg")
  .attr("viewBox", `0 0 ${width} ${height}`);

// === ARROW DEFINITION ===
svg.append("defs")
  .append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 0 10 10")
  .attr("refX", 8)
  .attr("refY", 5)
  .attr("markerWidth", 6)
  .attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M 0 0 L 10 5 L 0 10 z")
  .attr("fill", "black");

const g = svg.append("g");

// scales
const xScale = d3.scaleLinear().domain([-10, 10]).range([margin, width - margin]);
const yScale = d3.scaleLinear().domain([-10, 10]).range([height - margin, margin]);

// === DRAW AXES ===
function drawAxes() {
  g.selectAll("*").remove();

  // grid
  g.selectAll(".grid-x")
    .data(d3.range(-10, 11))
    .enter()
    .append("line")
    .attr("x1", d => xScale(d))
    .attr("x2", d => xScale(d))
    .attr("y1", margin)
    .attr("y2", height - margin)
    .attr("stroke", "#ffefe6");

  g.selectAll(".grid-y")
    .data(d3.range(-10, 11))
    .enter()
    .append("line")
    .attr("y1", d => yScale(d))
    .attr("y2", d => yScale(d))
    .attr("x1", margin)
    .attr("x2", width - margin)
    .attr("stroke", "#ffefe6");

  // X axis
  g.append("line")
    .attr("x1", margin)
    .attr("x2", width - margin)
    .attr("y1", yScale(0))
    .attr("y2", yScale(0))
    .attr("stroke", "black")
    .attr("stroke-width", 2)
    .attr("marker-end", "url(#arrow)");

  // Y axis
  g.append("line")
    .attr("x1", xScale(0))
    .attr("x2", xScale(0))
    .attr("y1", height - margin)
    .attr("y2", margin)
    .attr("stroke", "black")
    .attr("stroke-width", 2)
    .attr("marker-end", "url(#arrow)");

  // X numbers
  g.selectAll(".x-label")
    .data(d3.range(-10, 11))
    .enter()
    .append("text")
    .attr("x", d => xScale(d))
    .attr("y", yScale(0) + 20)
    .attr("text-anchor", "middle")
    .attr("font-size", "12px")
    .text(d => d);

  // Y numbers
  g.selectAll(".y-label")
    .data(d3.range(-10, 11))
    .enter()
    .append("text")
    .attr("x", xScale(0) - 15)
    .attr("y", d => yScale(d) + 4)
    .attr("text-anchor", "end")
    .attr("font-size", "12px")
    .text(d => d);
}

// === UPDATE ===
function update() {
  drawAxes();

  // line
  if (joined && pts.length > 1) {
    const line = d3.line()
      .x(d => xScale(d.x))
      .y(d => yScale(d.y));

    g.append("path")
      .datum(pts)
      .attr("fill", "none")
      .attr("stroke", "#ff4500")
      .attr("stroke-width", 3)
      .attr("d", line);
  }

  // points
  g.selectAll("circle")
    .data(pts)
    .enter()
    .append("circle")
    .attr("cx", d => xScale(d.x))
    .attr("cy", d => yScale(d.y))
    .attr("r", 5)
    .attr("fill", "#ff4500");
}

drawAxes();

// === CLICK ===
svg.on("click", function (event) {
  const [mx, my] = d3.pointer(event);

  const x = Math.round(xScale.invert(mx));
  const y = Math.round(yScale.invert(my));

  if (x < -10 || x > 10 || y < -10 || y > 10) return;

  if (pts.length > 0 && x < pts[pts.length - 1].x) return;

  pts.push({ x, y });
  update();
});

// === BUTTONS ===
document.getElementById("joinBtn").onclick = () => {
  joined = true;
  update();
};

document.getElementById("pointsBtn").onclick = () => {
  joined = false;
  update();
};

document.getElementById("undoBtn").onclick = () => {
  pts.pop();
  update();
};

document.getElementById("clearBtn").onclick = () => {
  pts = [];
  update();
};
</script>

</body>
</html>
